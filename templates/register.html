<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transparent Login Form</title>
  <link rel="stylesheet" type="text/css" href="/static/style.css" />
  <link rel="stylesheet" href="/static/bootstrap/css/bootstrap.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Square+Peg&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/static/mobile-responsive.css" />
</head>

<body>
  <div class="background-video">
    <video id="webcam" autoplay="true" playsinline="true"></video>
  </div>
  <div class="register-photo">
    <div class="form-container">
      <form method="post">
        <div class="form-group">
          <div class="logo">
            <!-- Logo removed as chill_baby.png is missing -->
          </div>
          <div class="form-data">
            <input class="form-control" id="username" type="text" placeholder="Patricia Vincent" />
            <input class="form-control" id="email" type="text" placeholder="e-mail id" />
            <input class="form-control" id="company" type="text" placeholder="Company Name" />
            <input class="form-control" id="profession" type="text" placeholder="Profession" />
            <span class="color-custom" style="text-align: start">Pick your intolerances</span>
            {% include "vectors.html" %}
            <div class="custom-btn-1">
              <button class="custom-btn" type="button" onclick="startProcessing()">Start</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
  <!-- <script src="/static/bootstrap/js/jquery-3.5.1.slim.min.js"></script>
    <script src="/static/bootstrap/js/popper.min.js"></script> -->
  <script src="/static/bootstrap/js/bootstrap.min.js"></script>
  <script src="/static/detail.js"></script>
</body>

</html>
